services:
  daniellooptenbeleeftapi:
    build:
      context: .
      dockerfile: DanielLooptEnBeleeftApi/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      ASPNETCORE_URLS: "http://+:8080;https://+:8081"
      ASPNETCORE_Kestrel__Certificates__Default__Path: "/https/DanielLooptEnBeleeftApi.pfx"
      ASPNETCORE_Kestrel__Certificates__Default__Password: "DanielLooptEnBeleeft"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=RunningRacesDb;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True"
    volumes:
      - ./https:/https:ro
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: daniellooptenbeleeft-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: